<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="./src/output.css">
</head>
<body>
    <header class="max-w-[1200px] m-auto h-[100px]  flex justify-between items-center"> 
        <div>
            <img src="src/images/Logo.png" alt="">
        </div>
        <input placeholder="Search bar"  type="search" class="border-1 border-[#808080b1] w-[400px] rounded-[5px] p-[10px] lg:block hidden" >
        <div class="flex justify-between items-center gap-[30px] text-[#1C3554]">
            <h1 class=" hidden lg:block">Category <i class="fa-solid fa-caret-down" style="color: rgb(0, 0, 0);"></i></h1>
            <h2 class=" hidden lg:block">Become an Mentor</h2>
            <button class="p-[10px_20px] rounded-[10px] border-2 border-[#1C3554] text-[#1C3554]">Login</button>
            <button class="p-[10px_20px] rounded-[10px] border-2  text-[white] bg-[#F72585]">Sign Up</button>
        </div>
    </header>
    <section class="max-w-[1200px] bg-[#021934] lg:h-[600px] h-[1500px] rounded-xl m-auto p-[30px] text-[white] lg:flex justify-between ">
        <div class="lg:w-[600px] lg:h-[500px] h-[700px] ">
            <h1 class="text-[60px] font-bold">Find the Best Courses and Amazing Mentor</h1>
            <p class="text-[18px] mt-[20px] mb-[20px]">Lorem ipsum dolor sit amet, consectetur adipiscing elit ut aliquam, purus sit amet luctus venenatis, lectus magna fringilla urna, porttitor rhoncus </p>
            <div class="flex items-center bg-white rounded-2xl p-2 max-w-6xl mx-auto">
                <svg class="w-8 h-8 text-slate-700 ml-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M10.5 18a7.5 7.5 0 100-15 7.5 7.5 0 000 15z" />
                </svg>
                <input type="text" placeholder="Type in the course you want to learn" class="flex-1 px-6 py-4 text-xl outline-none placeholder:text-gray-400"/>
                <button class="bg-pink-500 hover:bg-pink-600 text-white px-10 py-4 rounded-xl font-semibold">Search</button>
            </div>
            <div class="flex justify-between items-center mt-[20px]">
                <div> <img src="src/images/Life Time Acces.png" alt=""></div>
                <div> <img src="src/images/Expert Mentor.png" alt=""></div>
                <div> <img src="src/images/100K+ Courses.png" alt=""></div>
            </div>
        </div>
        <div class="lg:w-[450px] lg:h-[106%] h-[600px] bg-[#E5E5E5] rounded-xl shadow-2xl shadow-[0_20px_80px_rgba(0,0,0,0.2)] relative">
            <img class="absolute top-[80px] bottom-[] left-[20px] right-[]" src="src/images/Bell Icon.png" alt="">
            <img class="absolute top-[320px] bottom-[] left-[20px] right-[]" src="src/images/Love Icon.png" alt="">
            <img class="absolute top-[200px] bottom-[] left-[350px] right-[]" src="src/images/Verification Icon.png" alt="">
            <div class="w-[200px] rounded-[10px] p-[20px] text-center h-[140px] bg-[white] text-[#1C3554] absolute top-[400px] left-[230px]">
                <h1 class="font-bold text-[30px]">500+</h1>
                <p class="font-bold text-[20px] mb-[10px]">Total Review</p>
                <div>
                    <img src="src/images/Rating.png" alt="">
                </div>
            </div>
        </div>
    </section>
</body>
</html>
