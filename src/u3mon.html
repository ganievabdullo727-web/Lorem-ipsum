<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" href="./images/Logo.svg">
    <link rel="stylesheet" href="./output.css">
    <title>Programming Courses</title>

  <body>
     <header>
      <div class="bg-[#ffffff] p-[8px] flex justify-between items-center lg:max-w-[1400px] lg:m-auto lg:p-[25px]">
        <div class="lg:flex lg:gap-[30px] lg:relative">
          <img src="./images/Logo.svg" alt="">
          <input type="search" name="" id="" placeholder="Search bar" class="bg-transparent border-2 border-[#CCCCCC] rounded-[10px] outline-none p-[15px] w-[530px] hidden lg:block font-[550]">
          <div class="hidden lg:block absolute lg:left-[670px] lg:top-[13px] text-[18px] text-[#CCCCCC]">

          </div>
        </div>
        <div class="flex gap-[10px] lg:gap-[25px] items-center">

          <button class="bg-transparent border-2 border-[#1C3554] text-[#1C3554] rounded-[10px] py-[7px] px-[15px] font-[500] hover:bg-[#1C3554] hover:text-[#fff] transition duration-500 active:scale-60 lg:py-[10px] lg:px-[35px] lg:text-[18px] lg:font-[600]">Login</button>
